version: "3.9"

services:
  api:
    build: .
    container_name: logisense-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 10s
      start_period: 60s   # give TF + model loading time to finish
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: logisense-dashboard
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy   # waits for /health to return 200
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
